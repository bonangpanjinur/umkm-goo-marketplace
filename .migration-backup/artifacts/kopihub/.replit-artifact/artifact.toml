kind = "web"
previewPath = "/"
title = "KopiHub POS"
version = "1.0.0"
id = "artifacts/kopihub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24178

[services.development]
run = "pnpm --filter @workspace/kopihub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kopihub", "run", "build" ]
publicDir = "artifacts/kopihub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24178"
BASE_PATH = "/"
